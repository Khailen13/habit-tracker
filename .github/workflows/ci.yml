name: Django CI/CD Pipeline

on: [push]

env:
  DEBUG: ${{ secrets.DEBUG }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}
  POSTGRES_DB: test_db
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_pass
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  CELERY_BROKER_URL: memory://localhost/
  CELERY_RESULT_BACKEND: cache+memory://

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: flake8 .

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python and dependencies
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test


  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin

      - name: Build web service image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/web:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/web:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/web:latest

      - name: Build Nginx image
        working-directory: nginx
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/nginx:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/nginx:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/nginx:latest

      - name: Push web service image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/web:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/web:latest

      - name: Push Nginx image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/nginx:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/nginx:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -euxo pipefail           

            # Очистка и клонирование
            cd ~
            rm -rf project
            mkdir -p project
            cd project
            git clone -b ${{ github.ref_name }} https://github.com/${{ github.repository }}.git .

            # Создание .env 
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > .env
            echo "DEBUG=${{ secrets.DEBUG }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}" >> .env
            echo "POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}" >> .env
            echo "CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}" >> .env
            echo "CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}" >> .env
            echo "REDIS_LOCATION=${{ secrets.REDIS_LOCATION }}" >> .env
            echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env           
            echo "DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}" >> .env

            # Docker
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose pull
            docker compose up -d
            sleep 10

            # Миграции и статика
            docker compose exec -T web python manage.py migrate --noinput --fake-initial
            docker compose exec -T web python manage.py collectstatic --noinput

            # Проверка
            docker compose ps
          EOF
